<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Formulário</title>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <div class="image">
                
                <div class="logo">
                    <img src="img/odin-lined.png" alt="Logo odin">
                    <p>ODIN</p>
                </div>
            </div>
            <div class="teste">
                <div class="form">
                    <div class="text">
                        <p>This is not a real online service! You know you need something  like this in your life to help you realize you deepest dreams. 
                            Sign up now to get starded. 
                            
                        </p>
                        <br>
                        <p>You know what you want to.</p>
                    </div>
                    <div class="formulary">
                        <form action="get">
                            <div class="let">
                                <p>Let's do this!</p>
                            </div>
                                
                            <div class="form_grid">
                                <div class="form_row">
                                    <label for="first_name">FIRST NAME: </label>
                                    <input type="text" id="first_name" name="first_name" required>
                                </div>
                                <div class="form_row">
                                    <label for="last_name">LAST NAME: </label>
                                    <input type="text" name="last_name" id="last_name" required>
                                </div>
                                <div class="form_row">
                                    <label for="email">EMAIL: </label>
                                    <input type="email" id="email" name="email" required>
                                </div>
                                <div class="form_row">
                                    <label for="phone">PHONE NUMBER: </label>
                                    <input type="tel" name="phone" id="phone" required>
                                </div>
                                
                                <div class="form_row">
                                    <label for="password">PASSWORD</label>
                                    <input type="password" name="password" id="password" required>
                                </div>
                                <div class="form_row">
                                    <label for="verify_pass">CONFIRM PASSWORD</label>
                                    <input type="password" name="verify_pass" id="verify_pass" required>
                                </div>
                            </div>   
                        </form>
                    </div>
                </div>
                <div class="create_account">
                    <button id="create">Create Account</button>
                    <p>Already have an account? <a href="#">Log in</a>
                    </p>
                </div>
            </div>
        </div>
    </body>
</html>
